<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compound Interest Calculator</title>
  <style>
    :root {
      --bg: #0d1b2a;
      --surface: #112240;
      --surface-2: #1a2f4e;
      --border: #1e3a5f;
      --accent: #00c9a7;
      --accent-2: #00e676;
      --text: #e8f4f8;
      --text-muted: #7a9bb5;
      --danger: #ff5252;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    header {
      max-width: 860px;
      margin: 0 auto 24px;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    header p {
      color: var(--text-muted);
      margin-top: 4px;
      font-size: 0.9rem;
    }

    .inputs-panel {
      max-width: 860px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }

    .global-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .tax-hint {
      font-size: 0.75rem;
      color: var(--accent);
      margin-top: 4px;
      min-height: 1em;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="number"], input[type="text"] {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 8px 12px;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }

    input[type="number"]:focus, input[type="text"]:focus {
      border-color: var(--accent);
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      opacity: 0.4;
    }

    .phases-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .phases-header span {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-add {
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 6px 14px;
      transition: background 0.15s, color 0.15s;
    }

    .btn-add:hover:not(:disabled) {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-add:disabled {
      border-color: var(--border);
      color: var(--border);
      cursor: not-allowed;
    }

    #phases-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .phase-row {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
    }

    .phase-badge {
      background: var(--accent);
      border-radius: 50%;
      color: var(--bg);
      flex-shrink: 0;
      font-size: 0.7rem;
      font-weight: 800;
      height: 24px;
      line-height: 24px;
      text-align: center;
      width: 24px;
    }

    .phase-label-input {
      flex: 1.4;
      min-width: 80px;
    }

    .phase-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 70px;
    }

    .phase-field label {
      font-size: 0.7rem;
    }

    .btn-remove {
      background: transparent;
      border: 1px solid var(--danger);
      border-radius: 6px;
      color: var(--danger);
      cursor: pointer;
      flex-shrink: 0;
      font-size: 1rem;
      line-height: 1;
      padding: 5px 9px;
      transition: background 0.15s, color 0.15s;
    }

    .btn-remove:hover:not(:disabled) {
      background: var(--danger);
      color: #fff;
    }

    .btn-remove:disabled {
      border-color: var(--border);
      color: var(--border);
      cursor: not-allowed;
    }

    .phase-insert {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .phase-insert::before,
    .phase-insert::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-insert {
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 50%;
      color: var(--accent);
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      height: 22px;
      width: 22px;
      line-height: 1;
      padding: 0;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }

    .btn-insert:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .age-toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .age-toggle-label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      text-transform: none;
      font-weight: 500;
      letter-spacing: 0;
    }

    .age-toggle-label input[type="checkbox"] {
      accent-color: var(--accent);
      cursor: pointer;
      width: auto;
    }

    #age-input-wrapper input[type="number"] {
      width: 60px;
      padding: 4px 8px;
      font-size: 0.85rem;
    }

    #calc-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: var(--bg);
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      margin-top: 20px;
      padding: 12px 28px;
      transition: opacity 0.15s;
      width: 100%;
    }

    #calc-btn:hover { opacity: 0.88; }

    #results {
      max-width: 860px;
      margin: 24px auto 0;
      display: none;
    }

    #results.visible { display: block; }

    .summary-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }

    .stat-card .stat-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .stat-card .stat-value {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
    }

    .stat-card.highlight .stat-value { color: var(--accent-2); }

    .chart-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      position: relative;
    }

    #negative-warning {
      background: rgba(255, 82, 82, 0.12);
      border: 1px solid var(--danger);
      border-radius: 8px;
      color: var(--danger);
      display: none;
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 16px;
      padding: 10px 14px;
    }

    #negative-warning.visible { display: block; }

    /* ── Compare Mode ──────────────────────────────────────────────────────── */
    .hidden { display: none !important; }

    .header-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 16px;
    }

    #compare-toggle-btn {
      background: transparent; border: 1px solid var(--accent);
      border-radius: 8px; color: var(--accent); cursor: pointer;
      font-size: 0.875rem; font-weight: 600; padding: 8px 18px;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap; flex-shrink: 0; margin-top: 4px;
    }
    #compare-toggle-btn:hover, #compare-toggle-btn.active {
      background: var(--accent); color: var(--bg);
    }

    #compare-panel { max-width: 1200px; margin: 0 auto; }
    .compare-shared-inputs {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; margin-bottom: 16px;
    }
    .compare-shared-inputs .global-inputs { margin-bottom: 0; }
    .compare-toolbar { display: flex; justify-content: flex-end; margin-bottom: 16px; }
    #compare-calc-btn {
      background: var(--accent); border: none; border-radius: 8px;
      color: var(--bg); cursor: pointer; font-size: 1rem; font-weight: 700;
      margin-top: 20px; padding: 12px 28px; transition: opacity 0.15s; width: 100%;
    }
    #compare-calc-btn:hover { opacity: 0.88; }

    #compare-scenarios-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .scenario-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .scenario-header { display: flex; align-items: center; gap: 10px; }
    .scenario-color-swatch { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .scenario-name-input {
      flex: 1; background: transparent; border: none;
      border-bottom: 1px solid var(--border); border-radius: 0;
      color: var(--text); font-size: 0.95rem; font-weight: 600; padding: 4px 0;
    }
    .scenario-name-input:focus { border-bottom-color: var(--accent); outline: none; }
    .btn-remove-scenario {
      background: transparent; border: 1px solid var(--danger);
      border-radius: 6px; color: var(--danger); cursor: pointer;
      flex-shrink: 0; font-size: 1rem; line-height: 1; padding: 5px 9px;
      transition: background 0.15s, color 0.15s;
    }
    .btn-remove-scenario:hover:not(:disabled) { background: var(--danger); color: #fff; }
    .btn-remove-scenario:disabled { border-color: var(--border); color: var(--border); cursor: not-allowed; }

    .scenario-global-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    #compare-summary { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .compare-stat-card {
      flex: 1; min-width: 160px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 10px; padding: 16px;
      border-top-width: 3px; border-top-style: solid;
    }
    .compare-stat-card .stat-label {
      font-size: 0.72rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .compare-stat-card .stat-value { font-size: 1.25rem; font-weight: 700; }
    .compare-stat-card .stat-scenario-name { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }

    #results.compare-mode { max-width: 1200px; }

    @media (max-width: 600px) {
      .global-inputs {
        grid-template-columns: 1fr;
      }

      .summary-stats {
        grid-template-columns: 1fr 1fr;
      }

      .phase-row {
        flex-wrap: wrap;
        gap: 8px;
      }

      .phase-label-input {
        flex: 1 1 100%;
        order: 1;
      }

      .phase-badge {
        order: 0;
      }

      .btn-remove {
        order: 2;
        margin-left: auto;
      }

      .phase-field {
        flex: 1 1 calc(50% - 5px);
      }

      .scenario-global-inputs {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <h1>Compound Interest Calculator</h1>
      <p>Chain multiple contribution phases — add, hold, or withdraw over time.</p>
    </div>
    <button id="compare-toggle-btn" onclick="toggleCompareMode()">Compare Scenarios</button>
  </div>
</header>

<section class="inputs-panel">
  <div class="global-inputs">
    <div class="field">
      <label for="initial-amount">Initial Amount ($)</label>
      <input type="number" id="initial-amount" value="10000" min="0" step="100">
    </div>
    <div class="field">
      <label for="annual-rate">Annual Interest Rate (%)</label>
      <input type="number" id="annual-rate" value="7" min="0" step="0.1">
    </div>
    <div class="field">
      <label for="tax-rate">Withdrawal Tax Rate (%)</label>
      <input type="number" id="tax-rate" value="23" min="0" max="100" step="1"
        oninput="refreshTaxHints()" onchange="refreshTaxHints()">
    </div>
  </div>

  <div class="phases-section">
    <div class="phases-header">
      <span>Phases</span>
    </div>
    <div id="phases-list"></div>
  </div>

  <div class="age-toggle-row">
    <label class="age-toggle-label">
      <input type="checkbox" id="show-age" onchange="onShowAgeToggle()">
      Show age on chart
    </label>
    <span id="age-input-wrapper" style="display:none">
      &nbsp;Starting age:
      <input type="number" id="starting-age" min="0" max="150" step="1"
             style="width:60px" onchange="onCalculate()" oninput="onCalculate()">
    </span>
  </div>

  <button id="calc-btn" onclick="onCalculate()">Calculate</button>
</section>

<section id="compare-panel" class="hidden">
  <div class="compare-shared-inputs">
    <div class="global-inputs">
      <div class="field">
        <label for="compare-initial-amount">Initial Amount ($)</label>
        <input type="number" id="compare-initial-amount" value="10000" min="0" step="100">
      </div>
      <div class="field">
        <label for="compare-annual-rate">Annual Interest Rate (%)</label>
        <input type="number" id="compare-annual-rate" value="7" min="0" step="0.1">
      </div>
      <div class="field">
        <label for="compare-tax-rate">Withdrawal Tax Rate (%)</label>
        <input type="number" id="compare-tax-rate" value="23" min="0" max="100" step="1"
          oninput="refreshTaxHints()" onchange="refreshTaxHints()">
      </div>
    </div>
  </div>
  <div class="compare-toolbar">
    <button id="add-scenario-btn" class="btn-add" onclick="addCompareScenario()">+ Add Scenario</button>
  </div>
  <div id="compare-scenarios-grid"></div>
  <button id="compare-calc-btn" onclick="onCalculate()">Calculate</button>
</section>

<section id="results">
  <div id="negative-warning">
    ⚠ Balance went negative during the simulation — consider reducing withdrawal amounts.
  </div>
  <div id="normal-summary" class="summary-stats">
    <div class="stat-card highlight">
      <div class="stat-label">Final Value</div>
      <div class="stat-value" id="stat-final">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Initial + Contributions</div>
      <div class="stat-value" id="stat-principal">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Net Contributions</div>
      <div class="stat-value" id="stat-contrib">—</div>
    </div>
    <div class="stat-card highlight">
      <div class="stat-label">Interest Earned</div>
      <div class="stat-value" id="stat-interest">—</div>
    </div>
  </div>
  <div id="compare-summary" class="hidden"></div>
  <div class="chart-container">
    <canvas id="chart"></canvas>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let phaseIdCounter = 0;
  const state = {
    phases: []
  };
  let chartInstance = null;

  const SCENARIO_COLORS = ['#00c9a7', '#ff9f43', '#a29bfe'];
  let compareMode = false;
  let normalModeSnapshot = null;
  let comparePhaseIdCounter = 1000;
  const compareScenarios = [];

  // ── Utilities ──────────────────────────────────────────────────────────────
  function formatCurrency(v) {
    const abs = Math.abs(v);
    const formatted = abs.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return (v < 0 ? '-' : '') + '$' + formatted;
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function getTaxRate() {
    const id = compareMode ? 'compare-tax-rate' : 'tax-rate';
    return (parseFloat(document.getElementById(id)?.value) || 0) / 100;
  }

  function updateTaxHint(inputEl) {
    const hint = inputEl.parentNode.querySelector('.tax-hint');
    if (!hint) return;
    const monthly = parseFloat(inputEl.value) || 0;
    const taxRate = getTaxRate();
    if (monthly < 0) {
      const net = monthly * (1 - taxRate);
      hint.textContent = `after tax: $${Math.abs(net).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    } else {
      hint.textContent = '';
    }
  }

  function refreshTaxHints() {
    document.querySelectorAll('.phase-row input[type="number"]').forEach(input => {
      if (input.parentNode.querySelector('.tax-hint')) updateTaxHint(input);
    });
  }

  // ── Engine ─────────────────────────────────────────────────────────────────
  function calculate(initialAmount, annualRate, phases) {
    const rows = [];
    let balance = initialAmount;
    let cumContrib = 0;
    let year = 0;

    for (const phase of phases) {
      const years = Math.max(1, Math.round(phase.years));
      const monthly = phase.monthly;

      for (let y = 0; y < years; y++) {
        year++;
        balance = balance * (1 + annualRate / 100) + monthly * 12;
        cumContrib += monthly * 12;
        const cumInterest = balance - initialAmount - cumContrib;
        rows.push({ year, balance, cumContrib, cumInterest });
      }
    }

    return rows;
  }

  // ── Summary ────────────────────────────────────────────────────────────────
  function summarize(initialAmount, rows) {
    if (rows.length === 0) {
      return { finalValue: initialAmount, principal: initialAmount, netContrib: 0, interest: 0 };
    }
    const last = rows[rows.length - 1];
    return {
      finalValue: last.balance,
      principal: initialAmount + last.cumContrib,
      netContrib: last.cumContrib,
      interest: last.cumInterest
    };
  }

  // ── Chart ──────────────────────────────────────────────────────────────────
  function renderChart(rows, initialAmount) {
    const showAge = document.getElementById('show-age')?.checked;
    const startingAge = parseInt(document.getElementById('starting-age')?.value) || 0;
    const labels = rows.map(r => showAge ? 'Age ' + (startingAge + r.year) : 'Yr ' + r.year);
    const principalData = rows.map(r => initialAmount + r.cumContrib);
    const balanceData = rows.map(r => r.balance);
    const pointRadius = rows.length > 40 ? 0 : 3;

    if (chartInstance) {
      chartInstance.destroy();
      chartInstance = null;
    }

    const ctx = document.getElementById('chart').getContext('2d');
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Principal + Contributions',
            data: principalData,
            borderColor: '#00c9a7',
            backgroundColor: 'rgba(0,201,167,0.15)',
            fill: true,
            tension: 0.3,
            pointRadius,
            borderWidth: 2
          },
          {
            label: 'Total Balance',
            data: balanceData,
            borderColor: '#00e676',
            backgroundColor: 'transparent',
            fill: false,
            tension: 0.3,
            pointRadius,
            borderWidth: 2.5
          }
        ]
      },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            labels: { color: '#7a9bb5', font: { size: 12 } }
          },
          tooltip: {
            backgroundColor: '#112240',
            borderColor: '#1e3a5f',
            borderWidth: 1,
            titleColor: '#e8f4f8',
            bodyColor: '#7a9bb5',
            callbacks: {
              label: ctx => ' ' + ctx.dataset.label + ': ' + formatCurrency(ctx.parsed.y)
            }
          }
        },
        scales: {
          x: {
            ticks: { color: '#7a9bb5', font: { size: 11 } },
            grid: { color: 'rgba(30,58,95,0.6)' }
          },
          y: {
            ticks: {
              color: '#7a9bb5',
              font: { size: 11 },
              callback: v => '$' + (Math.abs(v) >= 1000 ? (v / 1000).toFixed(0) + 'k' : v)
            },
            grid: { color: 'rgba(30,58,95,0.6)' }
          }
        }
      }
    });
  }

  function renderChartCompare(results) {
    const maxYears = Math.max(...results.map(r => r.rows.length));
    const showAge = document.getElementById('show-age')?.checked;
    const startingAge = parseInt(document.getElementById('starting-age')?.value) || 0;
    const labels = Array.from({ length: maxYears }, (_, i) =>
      showAge ? 'Age ' + (startingAge + i + 1) : 'Yr ' + (i + 1)
    );
    const pointRadius = maxYears > 40 ? 0 : 3;

    if (chartInstance) {
      chartInstance.destroy();
      chartInstance = null;
    }

    const datasets = results.map((result, idx) => {
      const data = Array.from({ length: maxYears }, (_, i) =>
        i < result.rows.length ? result.rows[i].balance : null
      );
      return {
        label: result.scenario.label || ('Scenario ' + (idx + 1)),
        data,
        borderColor: SCENARIO_COLORS[idx],
        backgroundColor: 'transparent',
        fill: false,
        tension: 0.3,
        pointRadius,
        borderWidth: 2.5,
        spanGaps: false
      };
    });

    const ctx = document.getElementById('chart').getContext('2d');
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            labels: { color: '#7a9bb5', font: { size: 12 } }
          },
          tooltip: {
            backgroundColor: '#112240',
            borderColor: '#1e3a5f',
            borderWidth: 1,
            titleColor: '#e8f4f8',
            bodyColor: '#7a9bb5',
            callbacks: {
              label: ctx => ' ' + ctx.dataset.label + ': ' + (ctx.parsed.y != null ? formatCurrency(ctx.parsed.y) : '—')
            }
          }
        },
        scales: {
          x: {
            ticks: { color: '#7a9bb5', font: { size: 11 } },
            grid: { color: 'rgba(30,58,95,0.6)' }
          },
          y: {
            ticks: {
              color: '#7a9bb5',
              font: { size: 11 },
              callback: v => '$' + (Math.abs(v) >= 1000 ? (v / 1000).toFixed(0) + 'k' : v)
            },
            grid: { color: 'rgba(30,58,95,0.6)' }
          }
        }
      }
    });
  }

  // ── DOM / Phase Management ─────────────────────────────────────────────────
  function renderPhases() {
    const list = document.getElementById('phases-list');
    const only = state.phases.length === 1;

    list.innerHTML = state.phases.map((phase, idx) => `
      <div class="phase-row" data-id="${phase.id}">
        <div class="phase-badge">${idx + 1}</div>
        <div class="phase-label-input">
          <input type="text" value="${escapeHtml(phase.label)}"
            placeholder="Label (optional)"
            onchange="updatePhase(${phase.id}, 'label', this.value)">
        </div>
        <div class="phase-field">
          <label>Monthly ($)</label>
          <input type="number" value="${phase.monthly}" step="50"
            onchange="updatePhase(${phase.id}, 'monthly', this.value); updateTaxHint(this)"
            oninput="updatePhase(${phase.id}, 'monthly', this.value); updateTaxHint(this)">
          <div class="tax-hint">${phase.monthly < 0 ? `after tax: $${Math.abs(phase.monthly * (1 - getTaxRate())).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}` : ''}</div>
        </div>
        <div class="phase-field">
          <label>Years</label>
          <input type="number" value="${phase.years}" min="1" step="1"
            onchange="updatePhase(${phase.id}, 'years', this.value)"
            oninput="updatePhase(${phase.id}, 'years', this.value)">
        </div>
        <button class="btn-remove" onclick="removePhase(${phase.id})" ${only ? 'disabled' : ''} title="Remove step">×</button>
      </div>
      <div class="phase-insert">
        <button class="btn-insert" onclick="addPhaseAfter(${phase.id})" title="Add step here">+</button>
      </div>
    `).join('');
  }

  function addPhase() {
    phaseIdCounter++;
    state.phases.push({ id: phaseIdCounter, label: '', monthly: 500, years: 10 });
    renderPhases();
  }

  function addPhaseAfter(id) {
    phaseIdCounter++;
    const idx = state.phases.findIndex(p => p.id === id);
    state.phases.splice(idx + 1, 0, { id: phaseIdCounter, label: '', monthly: 500, years: 10 });
    renderPhases();
  }

  function removePhase(id) {
    if (state.phases.length <= 1) return;
    state.phases = state.phases.filter(p => p.id !== id);
    renderPhases();
  }

  function updatePhase(id, field, val) {
    const phase = state.phases.find(p => p.id === id);
    if (!phase) return;
    if (field === 'label') {
      phase.label = val;
    } else if (field === 'monthly') {
      phase.monthly = parseFloat(val) || 0;
    } else if (field === 'years') {
      phase.years = parseFloat(val) || 1;
    }
  }

  // ── Compare Mode Phase Management ──────────────────────────────────────────
  function renderCompareScenarios() {
    const grid = document.getElementById('compare-scenarios-grid');
    const only = compareScenarios.length === 1;

    grid.innerHTML = compareScenarios.map((scenario, sIdx) => {
      const color = SCENARIO_COLORS[sIdx];
      const onlyPhase = scenario.phases.length === 1;

      const phasesHtml = scenario.phases.map((phase, pIdx) => `
        <div class="phase-row" data-id="${phase.id}">
          <div class="phase-badge" style="background:${color}">${pIdx + 1}</div>
          <div class="phase-label-input">
            <input type="text" value="${escapeHtml(phase.label)}"
              placeholder="Label (optional)"
              onchange="updateComparePhase(${scenario.id}, ${phase.id}, 'label', this.value)">
          </div>
          <div class="phase-field">
            <label>Monthly ($)</label>
            <input type="number" value="${phase.monthly}" step="50"
              onchange="updateComparePhase(${scenario.id}, ${phase.id}, 'monthly', this.value); updateTaxHint(this)"
              oninput="updateComparePhase(${scenario.id}, ${phase.id}, 'monthly', this.value); updateTaxHint(this)">
            <div class="tax-hint">${phase.monthly < 0 ? `after tax: $${Math.abs(phase.monthly * (1 - getTaxRate())).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}` : ''}</div>
          </div>
          <div class="phase-field">
            <label>Years</label>
            <input type="number" value="${phase.years}" min="1" step="1"
              onchange="updateComparePhase(${scenario.id}, ${phase.id}, 'years', this.value)"
              oninput="updateComparePhase(${scenario.id}, ${phase.id}, 'years', this.value)">
          </div>
          <button class="btn-remove" onclick="removeComparePhase(${scenario.id}, ${phase.id})" ${onlyPhase ? 'disabled' : ''} title="Remove step">×</button>
        </div>
        <div class="phase-insert">
          <button class="btn-insert" onclick="addComparePhaseAfter(${scenario.id}, ${phase.id})" title="Add step here">+</button>
        </div>
      `).join('');

      return `
        <div class="scenario-card">
          <div class="scenario-header">
            <div class="scenario-color-swatch" style="background:${color}"></div>
            <input class="scenario-name-input" type="text" value="${escapeHtml(scenario.label)}"
              placeholder="Scenario name"
              onchange="updateCompareScenario(${scenario.id}, 'label', this.value)">
            <button class="btn-remove-scenario" onclick="removeCompareScenario(${scenario.id})" ${only ? 'disabled' : ''} title="Remove scenario">×</button>
          </div>
          <div class="phases-section">
            <div class="phases-header">
              <span>Phases</span>
            </div>
            <div style="display:flex;flex-direction:column;gap:10px">${phasesHtml}</div>
          </div>
        </div>
      `;
    }).join('');

    const addBtn = document.getElementById('add-scenario-btn');
    addBtn.disabled = compareScenarios.length >= 3;
  }

  function addCompareScenario() {
    if (compareScenarios.length >= 3) return;
    comparePhaseIdCounter++;
    const id = Date.now();
    compareScenarios.push({
      id,
      label: 'Scenario ' + (compareScenarios.length + 1),
      phases: [{ id: comparePhaseIdCounter, label: '', monthly: 500, years: 10 }]
    });
    renderCompareScenarios();
  }

  function removeCompareScenario(id) {
    if (compareScenarios.length <= 1) return;
    const idx = compareScenarios.findIndex(s => s.id === id);
    if (idx === -1) return;
    compareScenarios.splice(idx, 1);
    renderCompareScenarios();
  }

  function addComparePhase(scenarioId) {
    const scenario = compareScenarios.find(s => s.id === scenarioId);
    if (!scenario) return;
    comparePhaseIdCounter++;
    scenario.phases.push({ id: comparePhaseIdCounter, label: '', monthly: 500, years: 10 });
    renderCompareScenarios();
  }

  function addComparePhaseAfter(scenarioId, phaseId) {
    const scenario = compareScenarios.find(s => s.id === scenarioId);
    if (!scenario) return;
    comparePhaseIdCounter++;
    const idx = scenario.phases.findIndex(p => p.id === phaseId);
    scenario.phases.splice(idx + 1, 0, { id: comparePhaseIdCounter, label: '', monthly: 500, years: 10 });
    renderCompareScenarios();
  }

  function removeComparePhase(scenarioId, phaseId) {
    const scenario = compareScenarios.find(s => s.id === scenarioId);
    if (!scenario || scenario.phases.length <= 1) return;
    scenario.phases = scenario.phases.filter(p => p.id !== phaseId);
    renderCompareScenarios();
  }

  function updateCompareScenario(scenarioId, field, val) {
    const scenario = compareScenarios.find(s => s.id === scenarioId);
    if (!scenario) return;
    if (field === 'label') {
      scenario.label = val;
    }
  }

  function updateComparePhase(scenarioId, phaseId, field, val) {
    const scenario = compareScenarios.find(s => s.id === scenarioId);
    if (!scenario) return;
    const phase = scenario.phases.find(p => p.id === phaseId);
    if (!phase) return;
    if (field === 'label') {
      phase.label = val;
    } else if (field === 'monthly') {
      phase.monthly = parseFloat(val) || 0;
    } else if (field === 'years') {
      phase.years = parseFloat(val) || 1;
    }
  }

  // ── Compare Mode Summary ───────────────────────────────────────────────────
  function renderSummaryCompare(results) {
    const container = document.getElementById('compare-summary');
    container.innerHTML = results.map((result, idx) => {
      const color = SCENARIO_COLORS[idx];
      return `
        <div class="compare-stat-card" style="border-top-color: ${color}">
          <div class="stat-label">Final Value</div>
          <div class="stat-value" style="color: ${color}">${formatCurrency(result.stats.finalValue)}</div>
          <div class="stat-scenario-name">${escapeHtml(result.scenario.label || ('Scenario ' + (idx + 1)))}</div>
        </div>
      `;
    }).join('');

    document.getElementById('normal-summary').classList.add('hidden');
    container.classList.remove('hidden');
  }

  // ── Compare Mode Calculate ─────────────────────────────────────────────────
  function onCalculateCompare() {
    const initialAmount = parseFloat(document.getElementById('compare-initial-amount').value) || 0;
    const annualRate    = parseFloat(document.getElementById('compare-annual-rate').value) || 0;
    const results = compareScenarios.map(scenario => {
      const rows = calculate(initialAmount, annualRate, scenario.phases);
      const stats = summarize(initialAmount, rows);
      return { scenario, rows, stats };
    });

    const hasNegative = results.some(r => r.rows.some(row => row.balance < 0));
    document.getElementById('negative-warning').classList.toggle('visible', hasNegative);

    renderChartCompare(results);
    renderSummaryCompare(results);

    const resultsEl = document.getElementById('results');
    resultsEl.classList.add('visible', 'compare-mode');
  }

  // ── Compare Mode Toggle ────────────────────────────────────────────────────
  function toggleCompareMode() {
    compareMode = !compareMode;
    const btn = document.getElementById('compare-toggle-btn');
    const inputsPanel = document.querySelector('.inputs-panel');
    const comparePanel = document.getElementById('compare-panel');
    const resultsEl = document.getElementById('results');

    if (compareMode) {
      // Save snapshot of current normal mode state
      normalModeSnapshot = {
        initialAmount: parseFloat(document.getElementById('initial-amount').value) || 0,
        annualRate: parseFloat(document.getElementById('annual-rate').value) || 0,
        phases: state.phases.map(p => ({ ...p }))
      };

      // Seed shared inputs from snapshot
      document.getElementById('compare-initial-amount').value = normalModeSnapshot.initialAmount;
      document.getElementById('compare-annual-rate').value = normalModeSnapshot.annualRate;
      document.getElementById('compare-tax-rate').value = document.getElementById('tax-rate').value;

      // Seed compare scenarios from snapshot
      compareScenarios.length = 0;
      comparePhaseIdCounter++;
      compareScenarios.push({
        id: Date.now(),
        label: 'Scenario 1',
        phases: normalModeSnapshot.phases.map(p => ({ ...p, id: comparePhaseIdCounter++ }))
      });

      // Update UI
      btn.textContent = 'Exit Compare';
      btn.classList.add('active');
      inputsPanel.classList.add('hidden');
      comparePanel.classList.remove('hidden');
      resultsEl.classList.remove('visible', 'compare-mode');

      // Reset chart
      if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

      renderCompareScenarios();
    } else {
      // Restore normal mode
      btn.textContent = 'Compare Scenarios';
      btn.classList.remove('active');
      inputsPanel.classList.remove('hidden');
      comparePanel.classList.add('hidden');
      resultsEl.classList.remove('visible', 'compare-mode');

      // Restore snapshot
      if (normalModeSnapshot) {
        document.getElementById('initial-amount').value = normalModeSnapshot.initialAmount;
        document.getElementById('annual-rate').value = normalModeSnapshot.annualRate;
        document.getElementById('tax-rate').value = document.getElementById('compare-tax-rate').value;
        state.phases = normalModeSnapshot.phases.map(p => ({ ...p }));
        renderPhases();
      }

      // Restore summary visibility
      document.getElementById('normal-summary').classList.remove('hidden');
      document.getElementById('compare-summary').classList.add('hidden');

      // Destroy compare chart
      if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
    }
  }

  // ── Main Handler ───────────────────────────────────────────────────────────
  function onCalculate() {
    if (compareMode) { onCalculateCompare(); return; }

    const initialAmount = parseFloat(document.getElementById('initial-amount').value) || 0;
    const annualRate    = parseFloat(document.getElementById('annual-rate').value) || 0;
    const rows = calculate(initialAmount, annualRate, state.phases);
    const stats = summarize(initialAmount, rows);

    document.getElementById('stat-final').textContent = formatCurrency(stats.finalValue);
    document.getElementById('stat-principal').textContent = formatCurrency(stats.principal);
    document.getElementById('stat-contrib').textContent = formatCurrency(stats.netContrib);
    document.getElementById('stat-interest').textContent = formatCurrency(stats.interest);

    const hasNegative = rows.some(r => r.balance < 0);
    document.getElementById('negative-warning').classList.toggle('visible', hasNegative);

    if (rows.length > 0) {
      renderChart(rows, initialAmount);
    }

    const results = document.getElementById('results');
    results.classList.add('visible');
  }

  function onShowAgeToggle() {
    const checked = document.getElementById('show-age').checked;
    document.getElementById('age-input-wrapper').style.display = checked ? '' : 'none';
    onCalculate();
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  document.getElementById('starting-age').value = new Date().getFullYear() - 1990;
  addPhase();
</script>

</body>
</html>
